services:
  - type: web
    name: buildmaster-pro
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -c gunicorn.conf.py app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: RENDER
        value: "true"
      - key: PYTHON_VERSION
        value: "3.11.0"
    disk:
      name: buildmaster-data
      mountPath: /data
      sizeGB: 1
    healthCheckPath: /health
    autoDeploy: true
